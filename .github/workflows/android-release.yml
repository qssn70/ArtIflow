name: Android Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.0.0
        required: true
        type: string
      draft:
        description: Create the GitHub Release as a draft
        required: false
        default: false
        type: boolean
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Package release artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${{ github.event.inputs.tag || github.ref_name }}"
          artifact_dir="release-artifacts"
          source_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          artifact_name="ArtIflow-${tag_name}-release-unsigned.apk"

          mkdir -p "${artifact_dir}"
          cp "${source_apk}" "${artifact_dir}/${artifact_name}"
          sha256sum "${artifact_dir}/${artifact_name}" > "${artifact_dir}/${artifact_name}.sha256"

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "apk_path=${artifact_dir}/${artifact_name}" >> "${GITHUB_OUTPUT}"
          echo "sha256_path=${artifact_dir}/${artifact_name}.sha256" >> "${GITHUB_OUTPUT}"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArtIflow-release-apk
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag_name }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.apk_path }}
            ${{ steps.package.outputs.sha256_path }}
