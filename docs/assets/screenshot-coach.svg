  <text x="48" y="94" fill="#2E573F" font-size="56" font-family="Arial, Helvetica, sans-serif" font-weight="700">学习教练</text>

  <rect x="48" y="210" rx="34" ry="34" width="984" height="250" fill="#FFFDF8" stroke="#DAD2C5"/>
  <text x="88" y="292" fill="#2F433C" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="700">今日建议</text>
  <text x="88" y="352" fill="#55635D" font-size="30" font-family="Arial, Helvetica, sans-serif">你今天最该先补的是：函数与图像</text>
  <text x="88" y="402" fill="#55635D" font-size="30" font-family="Arial, Helvetica, sans-serif">先判断题型，再决定步骤，不要一上来就算。</text>

  <rect x="48" y="520" rx="32" ry="32" width="300" height="92" fill="#EEF6EE"/>
  <text x="92" y="578" fill="#356049" font-size="28" font-family="Arial, Helvetica, sans-serif">先说核心问题</text>
  <rect x="374" y="520" rx="32" ry="32" width="280" height="92" fill="#F2F0FF"/>
  <text x="414" y="578" fill="#5C4D91" font-size="28" font-family="Arial, Helvetica, sans-serif">给我一道题</text>
  <rect x="680" y="520" rx="32" ry="32" width="320" height="92" fill="#FFF3E6"/>
  <text x="722" y="578" fill="#9A6130" font-size="28" font-family="Arial, Helvetica, sans-serif">检查顺序</text>

  <rect x="48" y="680" rx="34" ry="34" width="984" height="680" fill="#FFFDF8" stroke="#DAD2C5"/>
  <text x="88" y="760" fill="#2F433C" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="700">推荐练习</text>
  <rect x="88" y="820" rx="24" ry="24" width="904" height="180" fill="#F4F8F3"/>
  <text x="124" y="894" fill="#345B41" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">函数与图像 · 入门回测</text>
  <text x="124" y="950" fill="#55635D" font-size="28" font-family="Arial, Helvetica, sans-serif">先只给题目，不给答案，答完后再批改。</text>
  <text x="124" y="1000" fill="#6B776F" font-size="24" font-family="Arial, Helvetica, sans-serif">依据：你今天反复卡在题型判断上。</text>

  <rect x="88" y="1038" rx="24" ry="24" width="904" height="220" fill="#F8F4EC"/>
  <text x="124" y="1112" fill="#5F4E35" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">训练闭环</text>
  <text x="124" y="1168" fill="#6E6557" font-size="28" font-family="Arial, Helvetica, sans-serif">- 先判断考点</text>
  <text x="124" y="1216" fill="#6E6557" font-size="28" font-family="Arial, Helvetica, sans-serif">- 再列步骤</text>
  <text x="124" y="1264" fill="#6E6557" font-size="28" font-family="Arial, Helvetica, sans-serif">- 最后复盘哪里卡住</text>

