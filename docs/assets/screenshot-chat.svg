<svg width="1080" height="2400" viewBox="0 0 1080 2400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="2400" fill="#F5F1E8"/>
  <rect x="0" y="0" width="1080" height="150" fill="#DCD0F0"/>
  <text x="48" y="94" fill="#3F3466" font-size="56" font-family="Arial, Helvetica, sans-serif" font-weight="700">ArtI flow</text>
  <rect x="664" y="210" rx="36" ry="36" width="360" height="174" fill="#2F7C67"/>
  <text x="708" y="288" fill="#FFFFFF" font-size="34" font-family="Arial, Helvetica, sans-serif">把双缝干涉公式讲一下</text>
  <text x="922" y="338" fill="#D6F0E8" font-size="26" font-family="Arial, Helvetica, sans-serif">08:38</text>

  <rect x="48" y="440" rx="36" ry="36" width="760" height="840" fill="#FFFDF8" stroke="#D7D0C0"/>
  <text x="88" y="520" fill="#355248" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="700">结论</text>
  <text x="88" y="580" fill="#2F433C" font-size="32" font-family="Arial, Helvetica, sans-serif">条纹间距公式是 Δx = Lλ / d</text>
  <text x="88" y="660" fill="#355248" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="700">关键步骤</text>
  <text x="88" y="720" fill="#2F433C" font-size="30" font-family="Arial, Helvetica, sans-serif">1. 先找相邻亮纹间距 Δx</text>
  <text x="88" y="775" fill="#2F433C" font-size="30" font-family="Arial, Helvetica, sans-serif">2. 再代入 L、d、λ 的关系式</text>
  <text x="88" y="830" fill="#2F433C" font-size="30" font-family="Arial, Helvetica, sans-serif">3. 注意单位统一成 m</text>

  <rect x="88" y="900" rx="20" ry="20" width="680" height="250" fill="#F6F0FF"/>
  <text x="130" y="985" fill="#5D3D8C" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">LaTeX Preview</text>
  <text x="130" y="1065" fill="#4B4160" font-size="42" font-family="Georgia, Times New Roman, serif">Δx = (Lλ) / d</text>

  <rect x="48" y="1335" rx="28" ry="28" width="984" height="120" fill="#EFE8D8"/>
  <text x="84" y="1408" fill="#6D644D" font-size="30" font-family="Arial, Helvetica, sans-serif">拍照搜题 · 公式渲染 · 追问讲解</text>

