<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySuit AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient-shape ambient-shape--one"></div>
    <div class="ambient-shape ambient-shape--two"></div>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="app-title">StudySuit · AI学习问答</p>
          <p class="app-subtitle">普通聊天外观，段落级左滑右滑交互</p>
        </div>
        <button id="newChatButton" class="secondary-button" type="button">新对话</button>
      </header>

      <section class="profile-panel" aria-label="用户画像">
        <p id="profileLevel" class="profile-item">画像等级：高二 · 进阶冲刺</p>
        <p id="profileTopics" class="profile-item">关注知识点：暂无</p>
        <p id="profileBehavior" class="profile-item">追问：0 次 · 语音追问：0 次</p>
      </section>

      <main id="chatThread" class="chat-thread" aria-live="polite"></main>

      <form id="composer" class="composer" autocomplete="off">
        <input
          id="questionInput"
          name="question"
          class="composer-input"
          type="text"
          placeholder="输入问题，比如：二次函数顶点式怎么快速判断最值？"
          required
        />
        <button class="primary-button" type="submit">发送</button>
      </form>
    </div>

    <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
    <aside id="detailDrawer" class="detail-drawer" aria-hidden="true">
      <header class="detail-header">
        <h2 class="detail-title">段落详解</h2>
        <button id="closeDrawerButton" class="secondary-button" type="button">关闭</button>
      </header>
      <section>
        <p class="detail-label">原始段落</p>
        <p id="detailOriginal" class="detail-block"></p>
      </section>
      <section>
        <p class="detail-label">讲解记录</p>
        <div id="detailHistory" class="detail-history"></div>
      </section>
    </aside>

    <div id="toast" class="toast" role="status" aria-live="assertive"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
